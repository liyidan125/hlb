<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的静态网站 | GitHub Pages</title>
    <style>
        /* 内嵌CSS，无需额外css文件，开箱即用 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        h1 {
            color: #2563eb;
            margin-bottom: 20px;
            text-align: center;
        }
        .desc {
            font-size: 18px;
            line-height: 1.8;
            color: #555;
            margin: 20px 0;
            text-align: center;
        }
        .box {
            margin-top: 40px;
            padding: 30px;
            background: #eff6ff;
            border-radius: 8px;
        }
        h3 {
            margin-bottom: 15px;
            color: #1d4ed8;
        }
        ul {
            line-height: 2;
            padding-left: 20px;
        }
        a {
            color: #2563eb;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        footer {
            margin-top: 50px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎访问我的静态站点</h1>
        <p class="desc">本网站托管于 GitHub Pages，纯静态 HTML/CSS/JS，全网公开访问，自动HTTPS加密</p>

        <div class="box">
            <h3>功能说明</h3>
            <ul>
                <li>支持完整 HTML、CSS、JavaScript 运行</li>
                <li>图片、样式、交互脚本全部正常加载</li>
                <li>无需服务器、无需备案、永久免费</li>
                <li>支持绑定自定义域名</li>
                <li>任何人打开链接即可浏览，无需登录</li>
            </ul>
        </div>

        <div class="box">
            <h3>测试链接示例</h3>
            <p>跳转测试：<a href="https://github.com" target="_blank">访问GitHub官网</a></p>
        </div>

        <!-- 这里可以写你的JS代码 -->
        <script>
            // 简单JS示例：页面加载弹窗提示
            window.onload = function() {
                console.log("页面加载完成，JS正常运行");
            }
        </script>

        <footer>
            Powered by GitHub Pages · 静态网站演示
        </footer>
    </div>
</body>
</html>
